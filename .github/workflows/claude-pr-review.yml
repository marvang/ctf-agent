name: "Round 1: Marius Claude Review"

on:
  pull_request:
    types: [opened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

jobs:
  marius-claude-review:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == false)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Signal Round 1 started
        run: |
          gh api repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/reactions -f content="heart"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-opus-4-6'
          use_sticky_comment: false
          classify_inline_comments: 'false'
          show_full_output: true
          prompt: |
            You are reviewing code that produces experimental data for peer-reviewed publication. Think like a skeptical peer reviewer. Be opinionated — strong views help surface real issues.

            For every change, think deeply: what breaks downstream if this is wrong? Not just whether the code is correct, but what silent damage it could cause to results, reproducibility, or experiment validity. Trace the data flow. Consider second-order effects. If a change looks safe on the surface, ask yourself what happens when it interacts with the rest of the system.

            Read CLAUDE.md and .github/copilot-instructions.md for project context.

            Your unique focus (other reviewers cover standard correctness):
            - Silent corruption — changes that could quietly produce wrong experiment results without any visible error
            - Downstream consequences — what breaks in the pipeline if this change has a subtle bug?
            - Entry point drift — if agent loop logic is touched, does it affect both main.py and main_experiment_agent.py?
            - Reproducibility — would this change make it harder to reproduce or compare experiment runs?
            - Security at system boundaries — command injection, path traversal, credential exposure, container escape

            Do not flag:
            - Style/formatting (ruff handles this via pre-commit hooks)
            - Type annotations that pass mypy strict mode
            - Experiment parameter changes in scripts/run_experiment.py (routine tweaks)
            - Import ordering (ruff enforces this)

            Post your review as a comment. For each finding, include the file:line reference and explain WHY it matters, not just what's wrong. Think hard before posting — quality over quantity.

      - name: Post review to PR
        if: always() && steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OUTPUT_FILE="/home/runner/work/_temp/claude-execution-output.json"
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "No Claude output file found, skipping review post"
            exit 0
          fi

          BODY=$(python3 -c "
          import json, sys
          with open('$OUTPUT_FILE') as f:
              data = json.load(f)
          result = data.get('result', '')
          if not result:
              sys.exit(1)
          print(result)
          " 2>/dev/null) || { echo "No result in output, skipping"; exit 0; }

          # Post as a formal PR review
          jq -n \
            --arg marker '<!-- reviewer:claude-round1 -->' \
            --arg body "$BODY" \
            '{event: "COMMENT", body: ($marker + "\n" + $body)}' | \
            gh api "repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}/reviews" \
              --input - --silent && echo "Posted review to PR" || echo "Failed to post review"
