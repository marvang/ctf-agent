name: "Round 1: CC Review"

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  claude-review:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-opus-4-6'
          classify_inline_comments: 'false'
          show_full_output: true
          prompt: |
            You are reviewing code that produces experimental data for peer-reviewed publication. Think like a skeptical peer reviewer — for each change, reason about what breaks downstream if this is wrong. Not just whether the code is correct, but what silent damage it could cause to results, reproducibility, or experiment validity.

            Read CLAUDE.md and .github/copilot-instructions.md for project context.

            Pay special attention to:
            - Changes that could silently corrupt experiment results or metrics
            - Entry point drift between main.py and main_experiment_agent.py (shared agent loop logic must stay in sync)
            - Security at system boundaries (command injection, path traversal, credential exposure)
            - Breaking changes to result format, Docker lifecycle, or relay protocol

            Do not flag:
            - Style/formatting (ruff handles this via pre-commit hooks)
            - Type annotations that pass mypy strict mode
            - Experiment parameter changes in scripts/run_experiment.py (routine tweaks)
            - Import ordering (ruff enforces this)

            Post inline comments on specific lines. Be concise and actionable.
