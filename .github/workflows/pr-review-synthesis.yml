name: "Round 2: Marius Claude Synthesis"

on:
  pull_request:
    types: [opened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to synthesize"
        required: true
        type: string

jobs:
  synthesize:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == false)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Signal Round 2 started
        run: |
          gh api repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/reactions -f content="rocket"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for reviewers
        if: github.event_name != 'workflow_dispatch'
        run: |
          echo "Waiting 20 minutes for reviewers to finish..."
          sleep 1200

      - name: Collect reviews into reviews.json
        run: |
          PR=${{ steps.pr.outputs.number }}

          gh api repos/$REPO/pulls/$PR/comments --paginate > review_comments.json
          gh api repos/$REPO/pulls/$PR/reviews --paginate > review_bodies.json
          gh api repos/$REPO/issues/$PR/comments --paginate > issue_comments.json

          python3 - <<'PY'
          import json
          from collections import Counter

          CLAUDE_ROUND1_MARKER = "<!-- reviewer:claude-round1 -->"
          CLAUDE_SYNTHESIS_MARKER = "<!-- reviewer:claude-synthesis -->"

          copilot_logins = {"Copilot", "copilot-pull-request-reviewer[bot]"}
          codex_logins = {"chatgpt-codex-connector[bot]"}
          claude_logins = {"claude[bot]"}

          result = {"copilot": [], "codex": [], "claude": [], "other": []}
          kind_counts = Counter()

          def strip_markers(body: str) -> str:
              return (
                  body.replace(CLAUDE_ROUND1_MARKER, "")
                  .replace(CLAUDE_SYNTHESIS_MARKER, "")
                  .strip()
              )

          def classify_reviewer(login: str, body: str):
              if CLAUDE_SYNTHESIS_MARKER in body:
                  return None
              if CLAUDE_ROUND1_MARKER in body:
                  return "claude"
              if login in copilot_logins:
                  return "copilot"
              if login in codex_logins:
                  return "codex"
              if login in claude_logins:
                  return "claude"
              return "other"

          def append_entry(item: dict, kind: str) -> None:
              body = item.get("body") or ""
              reviewer = classify_reviewer(item.get("user", {}).get("login", ""), body)
              if reviewer is None:
                  return

              clean_body = strip_markers(body)
              if not clean_body:
                  return

              entry = {
                  "id": item.get("node_id", ""),
                  "numeric_id": item.get("id"),
                  "reviewer": reviewer,
                  "kind": kind,
                  "author_login": item.get("user", {}).get("login", ""),
                  "path": item.get("path", ""),
                  "line": item.get("line") or item.get("original_line"),
                  "body": clean_body,
                  "url": item.get("html_url", ""),
              }

              if kind == "review":
                  entry["state"] = item.get("state", "")
                  entry["submitted_at"] = item.get("submitted_at", "")
              elif kind == "review_comment":
                  entry["pull_request_review_id"] = item.get("pull_request_review_id")

              result[reviewer].append(entry)
              kind_counts[kind] += 1

          with open("review_comments.json") as f:
              for item in json.load(f):
                  append_entry(item, "review_comment")

          with open("review_bodies.json") as f:
              for item in json.load(f):
                  append_entry(item, "review")

          with open("issue_comments.json") as f:
              for item in json.load(f):
                  append_entry(item, "issue_comment")

          with open("reviews.json", "w") as f:
              json.dump(result, f, indent=2)

          total = sum(len(v) for v in result.values())
          print(
              "Collected "
              f"{total} review items: "
              f"Copilot={len(result['copilot'])}, "
              f"Codex={len(result['codex'])}, "
              f"Claude={len(result['claude'])}, "
              f"Other={len(result['other'])} | "
              f"Kinds: review_comment={kind_counts['review_comment']}, "
              f"review={kind_counts['review']}, "
              f"issue_comment={kind_counts['issue_comment']}"
          )
          PY

      - name: Investigate and synthesize
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: false
          claude_args: '--model claude-opus-4-6'
          prompt: |
            You are the judge, not another reviewer. `reviews.json` contains everything posted by Copilot, Codex, and Claude across the PR review surfaces. Your job is to extract the substantive findings, investigate them like a detective, and deliver a ruling.

            Read CLAUDE.md and .github/copilot-instructions.md for project context. This is a research codebase producing experimental data for peer-reviewed publication.

            `reviews.json` is grouped by reviewer. Each entry has:
            - `kind="review_comment"` for inline PR review comments
            - `kind="review"` for top-level PR review bodies
            - `kind="issue_comment"` for PR conversation comments

            Important:
            - Claude Round 1 may appear as one large `review` entry. Treat that as real review content and extract concrete findings from it.
            - Copilot/Codex top-level `review` entries are often summaries. Use them as context unless they contain a concrete issue not covered elsewhere.
            - Do not assume every entry is already a single finding. Split large review bodies into their individual findings before scoring.

            ## Investigation Process

            For each substantive finding you extract from or support with `reviews.json`:

            1. **Read the actual code** at the referenced file:line. Do not take the reviewer's word for it.
            2. **Examine through multiple lenses:**
               - **Correctness** — Is the logic actually wrong? Trace the data flow. Check edge cases.
               - **Security** — Command injection, path traversal, credential exposure, container escape.
               - **Reproducibility** — Could this silently corrupt experiment results or break benchmark isolation?
               - **Simplicity** — Is the proposed fix worth the complexity? Is there a simpler approach?
               - **Entry point drift** — If the change touches agent loop logic, does it affect both `main.py` and `main_experiment_agent.py`?
            3. **Render verdict** — Real issue or false positive? If multiple reviewers flagged the same thing, do they agree on severity and solution?
            4. **Score** — Impact (1-5), Confidence (1-5), Fix Cost (1-5)
            5. **Propose** — If worth fixing, proposed solution in max 2 sentences with file:line reference

            Also flag issues the reviewers missed. Their comments are a starting point, not a ceiling.

            ## Standing Rules
            - Auto-dismiss experiment parameter changes in `scripts/run_experiment.py` (routine tweaks)
            - Scientific rigor and reproducibility outweigh code style
            - Findings flagged by multiple reviewers carry more weight than single-reviewer findings
            - When reviewers disagree, investigate deeper — the disagreement itself is signal

            ## Output: Decision Document

            Post as a PR comment in this exact format:

            ## PR Review Synthesis

            ### Executive Summary
            | # | Finding | File:Line | Impact | Conf | Cost | Reviewers | Verdict |
            |---|---------|-----------|--------|------|------|-----------|---------|

            Reviewers column: which of the 3 flagged it (e.g. "Copilot, Codex" or "Claude only").
            Verdict: **Fix** (clear issue, you know what to do), **Skip** (false positive or not worth it), **Decision** (needs user input — reviewers disagree or trade-off is unclear).

            ### Decision Points
            For each Decision verdict: what the reviewers said, what you found on investigation, framed as a clear binary choice: "do X or do Y?"

            ### Consensus Fixes
            Findings where verdict is Fix. For each: one-line issue description + proposed solution.

            ### Auto-dismissed
            Items dismissed by standing rules, with brief reason.

            ### Detailed Findings
            Per-finding: which reviewers flagged it, their original comments, your investigation across all lenses, scores, and reasoning for the verdict.

            The report must be self-contained. Do not offer to implement anything. List every decision point that requires user input.

            Also write your verdicts to `verdicts.json` — an array of objects, one per finding:
            ```json
            [
              {
                "number": 1,
                "finding": "Race in session ID",
                "verdict": "Fix",
                "impact": 4, "confidence": 5, "cost": 2,
                "comment_ids": ["NODE_ID_1", "NODE_ID_2"],
                "representative_id": "NODE_ID_1",
                "duplicate_ids": ["NODE_ID_2"]
              }
            ]
            ```
            `comment_ids`: all source node IDs from `reviews.json` that relate to this finding, regardless of kind.
            `representative_id`: the best single source item to keep as the canonical reference for this finding.
            `duplicate_ids`: source IDs that are duplicate evidence for the same finding.
            Include all findings — Fix, Skip, Decision, and Auto-dismissed.

      - name: Post synthesis to PR
        if: always() && steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OUTPUT_FILE="/home/runner/work/_temp/claude-execution-output.json"
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "No Claude output file found, skipping review post"
            exit 0
          fi

          BODY=$(python3 -c "
          import json, sys
          with open('$OUTPUT_FILE') as f:
              data = json.load(f)
          result = data.get('result', '')
          if not result:
              sys.exit(1)
          print(result)
          " 2>/dev/null) || { echo "No result in output, skipping"; exit 0; }

          # Post as a formal PR review
          jq -n \
            --arg marker '<!-- reviewer:claude-synthesis -->' \
            --arg body "$BODY" \
            '{event: "COMMENT", body: ($marker + "\n" + $body)}' | \
            gh api "repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}/reviews" \
              --input - --silent && echo "Posted synthesis to PR" || echo "Failed to post synthesis"

      - name: Annotate PR comments
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-haiku-4-5-20251001 --max-turns 15'
          prompt: |
            Read `verdicts.json` and `reviews.json`. Your job is to annotate the PR review comments based on the investigation verdicts. Do NOT re-investigate — just execute the annotations.

            Build a lookup from `reviews.json` by node ID before taking action.
            Only entries with `kind == "review_comment"` are annotatable. Entries with `kind == "review"` or `kind == "issue_comment"` are evidence for synthesis only and must never be resolved, reacted to, or replied to.

            ## Step 1: Resolve threads that should be hidden

            For each finding in `verdicts.json`:

            First derive:
            - `annotatable_ids`: IDs in `comment_ids` whose entry kind is `review_comment`
            - `annotatable_duplicate_ids`: IDs in `duplicate_ids` whose entry kind is `review_comment`
            - `representative_entry`: the entry in `reviews.json` for `representative_id`

            **Resolve duplicates:** For every ID in `annotatable_duplicate_ids`, resolve the thread:
            ```
            gh api graphql -f query='mutation { resolveReviewThread(input: {threadId: "NODE_ID"}) { thread { isResolved } } }'
            ```

            **Resolve confident skips:** If verdict=Skip AND confidence>=5, resolve all `annotatable_ids` for that finding.

            **Resolve auto-dismissed:** If verdict contains "Auto-dismissed" or similar, resolve all `annotatable_ids`.

            Do NOT resolve threads for Fix or Decision verdicts.

            ## Step 2: React and score remaining (non-resolved) comments

            For each finding where the `representative_entry` is a `review_comment` and was NOT resolved:

            Use `representative_entry.numeric_id` as the REST comment ID.

            **Add emoji reaction** on the representative comment.
            - verdict=Fix → `gh api repos/${{ github.repository }}/pulls/comments/{numeric_id}/reactions -f content="+1"`
            - verdict=Decision → `gh api repos/${{ github.repository }}/pulls/comments/{numeric_id}/reactions -f content="confused"`
            - verdict=Skip (confidence<5) → `gh api repos/${{ github.repository }}/pulls/comments/{numeric_id}/reactions -f content="-1"`

            **Reply with scores** on the representative comment:
            ```
            gh api repos/${{ github.repository }}/pulls/comments/{numeric_id}/replies -f body="Impact:{impact} | Conf:{confidence} | Cost:{cost} → **{verdict}**"
            ```

            Keep replies to one line. No explanation — the full reasoning is in the synthesis report.
