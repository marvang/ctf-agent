services:
  kali:
    build: .
    container_name: kali-linux
    working_dir: /ctf-workspace
    tty: true
    stdin_open: true
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - NET_BIND_SERVICE
    devices:
      - /dev/net/tun          # needed for OpenVPN/WireGuard
    privileged: true           # Required for VPN functionality
    volumes:
      - ./ctf-workspace:/ctf-workspace
    # env_file: # Optional if we want to load environment variables inside the container
    #   - .env

  # Optional local vulnerable target (example)
  # target:
  #   image: vulnerables/
  #   container_name: ctf-target
  #   ports:
  #     - "8080:80"


